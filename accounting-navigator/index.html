<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Rutgers Accounting Navigator</h1>
        <nav>
            <button onclick="showTab('plan')">📅 Roadmap</button>
            <button onclick="showTab('branding')">📱 Branding</button>
            <button onclick="showTab('tools')">🛠️ Study Tools</button>
            <button onclick="showTab('engagement')">🤝 Clubs</button>
        </nav>
    </header>

    <main id="app-container">
        <section id="plan" class="tab-content">
            <div id="survey-container">
                <h2>Interactive Academic Advisor</h2>
                
                <div id="step1">
                    <label>1. What is your current status?</label>
                    <select id="user-year">
                        <option value="freshman">Freshman</option>
                        <option value="sophomore">Sophomore</option>
                        <option value="junior">Junior</option>
                        <option value="senior">Senior</option>
                    </select>
                    <button class="action-btn" onclick="nextStep(1)">Next</button>
                </div>

                <div id="step2" class="hidden">
                    <label>2. Choose your CPA pathway:</label>
                    <select id="cpa-path">
                        <option>120 credits + 2yrs working plan</option>
                        <option>150 credits + 1yr working plan</option>
                    </select>
                    <button class="action-btn" onclick="nextStep(2)">Next</button>
                </div>

                <div id="step3" class="hidden">
                    <label>3. What is your target Graduation date?</label>
                    <input type="text" id="grad-date" placeholder="e.g. May 2027">
                    <button class="action-btn" onclick="generateRoadmap()">Generate My Checklist</button>
                </div>
            </div>

            <div id="personalized-results" class="hidden">
                <div class="meta-info">
                    <p id="display-summary"></p>
                    <div class="upload-box">
                        <label>Upload completion PDF (Optional):</label>
                        <input type="file" accept="application/pdf">
                    </div>
                </div>
                <div id="checklist-area"></div>
                <button class="secondary-btn" onclick="location.reload()">Start Over</button>
            </div>
        </section>

        <section id="branding" class="tab-content hidden"><h2>Branding Methods</h2><div id="branding-list"></div></section>
        <section id="tools" class="tab-content hidden"><h2>CPA Study Tools</h2><div id="tools-list"></div></section>
        <section id="engagement" class="tab-content hidden"><h2>Student Organizations</h2><div id="clubs-list"></div></section>
    </main>
    <script src="app.js"></script>
</body>
</html>
