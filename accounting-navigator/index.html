<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Navigator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Rutgers Accounting Navigator</h1>
        <nav>
            <button onclick="showTab('plan')">📅 Roadmap</button>
            <button onclick="showTab('branding')">📱 Branding</button>
            <button onclick="showTab('tools')">🛠️ Study Tools</button>
            <button onclick="showTab('engagement')">🤝 Clubs</button>
        </nav>
    </header>

    <main id="app-container">
        <section id="plan" class="tab-content">
            <div id="survey-container">
                <h2>Interactive Academic Advisor</h2>
                
                <div class="step" id="step1">
                    <label>1. What is your current status?</label>
                    <select id="user-year">
                        <option value="freshman">Freshman</option>
                        <option value="sophomore">Sophomore</option>
                        <option value="junior">Junior</option>
                        <option value="senior">Senior</option>
                    </select>
                    <button class="action-btn" onclick="nextStep(2)">Next</button>
                </div>

                <div class="step hidden" id="step2">
                    <label>2. Select your CPA Pathway:</label>
                    <select id="pathway">
                        <option>120 Credits + 2 Years Work Experience</option>
                        <option>150 Credits + 1 Year Work Experience</option>
                    </select>
                    <button class="action-btn" onclick="nextStep(3)">Next</button>
                </div>

                <div class="step hidden" id="step3">
                    <label>3. Target Graduation Date:</label>
                    <input type="text" id="grad-date" placeholder="MM/YYYY">
                    <button class="action-btn" onclick="generateRoadmap()">Generate My Checklist</button>
                </div>
            </div>

            <div id="personalized-results" class="hidden">
                <div class="profile-header">
                    <p id="display-grad"></p>
                    <div class="upload-section">
                        <label>Upload Degree Navigator PDF:</label>
                        <input type="file" id="pdf-upload" accept="application/pdf">
                    </div>
                </div>
                
                <div id="checklist-area"></div>
                <button class="secondary-btn" onclick="location.reload()">Reset Advisor</button>
            </div>
        </section>

        <section id="branding" class="tab-content hidden"><h2>Digital Branding</h2><div id="branding-list"></div></section>
        <section id="tools" class="tab-content hidden"><h2>CPA Study Materials</h2><div id="tools-list"></div></section>
        <section id="engagement" class="tab-content hidden"><h2>Student Organizations</h2><div id="clubs-list"></div></section>
    </main>

    <script src="app.js"></script>
</body>
</html>
